name: Check Package Versions

on:
  schedule:
    # Run every 4 hours
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  check-versions:
    env:
      GITHUB_REPO: "Warm-shower/warmshower-pkgbuilds"
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Use Arch Linux container — avoids fragile Ubuntu apt install of nvchecker + pacman-package-manager.
    # Arch container already has pacman; nvchecker is available in the extra repository.
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pacman -Syu --noconfirm nvchecker jq

      - name: Run version checker
        run: .github/scripts/checker.sh --ci
